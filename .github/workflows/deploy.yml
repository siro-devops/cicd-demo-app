name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Test Job - Runs tests before deployment
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📦 Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi
      
      - name: ✅ Run tests
        run: |
          if [ -f test.js ]; then
            node test.js
          else
            echo "No test file found, skipping tests"
          fi
      
      - name: 🔍 Validate HTML files
        run: |
          echo "Validating HTML files..."
          if grep -q "DevOps Portfolio Dashboard" index.html; then
            echo "✅ HTML validation passed"
          else
            echo "❌ HTML validation failed - missing title"
            exit 1
          fi
          
          if grep -q "project-card" index.html; then
            echo "✅ Project cards found"
          else
            echo "⚠️ No project cards found"
          fi
      
      - name: 📊 Display file structure
        run: |
          echo "📁 Repository Structure:"
          ls -la

  # Deploy Job - Only runs on push to main branch
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 Auto-deploy from GitHub Actions - ${{ github.sha }}'
      
      - name: ✅ Deployment complete
        run: |
          echo "✅ Successfully deployed to GitHub Pages!"
          echo "🌐 Your site will be available at: https://siro-devops.github.io/cicd-demo-app"
      
      - name: 📝 Update deployment status
        run: |
          echo "DEPLOYMENT_STATUS=success" >> $GITHUB_ENV
          echo "DEPLOYMENT_TIME=$(date)" >> $GITHUB_ENV

  # Status Check - Final status
  status:
    name: 📊 Pipeline Status
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    
    steps:
      - name: 🎯 Display pipeline status
        run: |
          echo "========================================="
          echo "📊 CI/CD PIPELINE EXECUTION COMPLETE"
          echo "========================================="
          echo "✅ Test Job: ${{ needs.test.result }}"
          echo "✅ Deploy Job: ${{ needs.deploy.result }}"
          echo "========================================="
          
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "🎉 All stages completed successfully!"
            echo "🌐 Live site: https://siro-devops.github.io/cicd-demo-app"
          else
            echo "⚠️ Some stages failed. Please check the logs."
          fi
