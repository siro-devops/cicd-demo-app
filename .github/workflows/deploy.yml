name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-portfolio-dashboard

jobs:
  # Test Job
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run tests
        run: |
          if [ -f test.js ]; then
            node test.js
          else
            echo "No tests found"
          fi
      
      - name: Validate HTML
        run: |
          if grep -q "DevOps Portfolio Dashboard" index.html; then
            echo "✅ HTML validation passed"
          else
            echo "❌ HTML validation failed"
            exit 1
          fi

  # Docker Build & Push Job
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value=${{ github.run_number }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: Image digest
        run: echo "Image pushed to ${{ env.IMAGE_NAME }}"

  # Deploy to GitHub Pages
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Final Status
  status:
    name: 📊 Pipeline Status
    runs-on: ubuntu-latest
    needs: [test, docker, deploy]
    if: always()
    steps:
      - run: |
          echo "========================================="
          echo "📊 CI/CD PIPELINE EXECUTION COMPLETE"
          echo "========================================="
          echo "✅ Test: ${{ needs.test.result }}"
          echo "✅ Docker: ${{ needs.docker.result }}"
          echo "✅ Deploy: ${{ needs.deploy.result }}"
          echo "========================================="
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.docker.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "🎉 All stages completed successfully!"
            echo "🌐 Live site: https://siro-devops.github.io/cicd-demo-app"
            echo "🐳 Docker image: ${{ env.IMAGE_NAME }}"
          fi
